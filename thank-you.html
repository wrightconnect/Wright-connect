<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | Wright Connect</title>
  <meta name="description" content="Thank you for contacting Wright Connect." />

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(180deg,#01040b 0%, #020617 45%, #06111f 100%);
      color:white;
      text-align:center;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .card{
      width:100%;
      max-width:700px;
      background:#0b1b2b;
      border:1px solid rgba(34,211,238,0.22);
      border-radius:16px;
      padding:50px 30px;
      box-shadow:0 10px 30px rgba(0,0,0,0.25);
    }

    .logo{
      width:220px;
      max-width:80%;
      margin-bottom:25px;
      border-radius:12px;
      box-shadow:0 0 24px rgba(34,211,238,0.18);
    }

    h1{
      margin:0 0 18px;
      font-size:44px;
      color:#22d3ee;
    }

    p{
      margin:12px auto;
      max-width:540px;
      font-size:18px;
      line-height:1.7;
      color:#dbeafe;
    }

    .btn{
      display:inline-block;
      margin-top:28px;
      background:#22d3ee;
      color:#04111d;
      text-decoration:none;
      font-weight:bold;
      padding:14px 28px;
      border-radius:10px;
    }

    @media (max-width:600px){
      h1{
        font-size:34px;
      }

      p{
        font-size:16px;
      }

      .card{
        padding:36px 22px;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <img src="logo.jpg" alt="Wright Connect Logo" class="logo">

    <h1>Thank You!</h1>

    <p>Your message has been received.</p>
    <p>Wright Connect will review your request and get back to you within 24 hours.</p>

    <a href="index.html" class="btn">Back to Home</a>
  </div>

</body>
</html>
